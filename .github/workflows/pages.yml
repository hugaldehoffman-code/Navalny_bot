name: Deploy Mini App to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'miniapp/**'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy miniapp/ to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./miniapp
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Deploy miniapp to GitHub Pages"
