name: Deploy to Selectel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /root/Navalniy_Bot
            git rm --cached MAIN/.env MAIN/navalny_bot.db 2>/dev/null || true
            rm -f .gitignore
            git -c http.proxy=${{ secrets.GIT_PROXY_URL }} pull
            echo "=== Commit: $(git rev-parse --short HEAD)"
            systemctl restart navalny_bot
            echo "=== Service: $(systemctl is-active navalny_bot)"
