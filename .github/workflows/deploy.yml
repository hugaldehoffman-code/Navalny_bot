name: Deploy to Selectel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            echo "=== PWD: $(pwd)"
            echo "=== Project dir exists: $(ls /root/Navalniy_Bot 2>&1 | head -3)"
            cd /root/Navalniy_Bot
            echo "=== Current commit before pull: $(git rev-parse --short HEAD)"
            git -c http.proxy=${{ secrets.GIT_PROXY_URL }} pull
            echo "=== Current commit after pull: $(git rev-parse --short HEAD)"
            systemctl restart navalny_bot
            echo "=== Service status: $(systemctl is-active navalny_bot)"
